<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Воздух в доме — Privox</title>
<style>
  :root{
    --bg:#eef1f6; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --good:#16a34a; --mod:#d97706; --poor:#ea580c; --bad:#dc2626;
    --good-bg:#dcfce7; --mod-bg:#fef3c7; --poor-bg:#ffedd5; --bad-bg:#fee2e2;
    --info:#4338ca; --info-bg:#eef2ff;
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#0d1117; --card:#161b26; --ink:#e6edf3; --muted:#8b98a9; --line:#232a36;
    --good:#4ade80; --mod:#fbbf24; --poor:#fb923c; --bad:#f87171;
    --good-bg:#0f2a1b; --mod-bg:#2a220c; --poor-bg:#2a1a0c; --bad-bg:#2a1114;
    --info:#a5b4fc; --info-bg:#171a33;
  }}
  :root[data-theme="dark"]{
    --bg:#0d1117; --card:#161b26; --ink:#e6edf3; --muted:#8b98a9; --line:#232a36;
    --good:#4ade80; --mod:#fbbf24; --poor:#fb923c; --bad:#f87171;
    --good-bg:#0f2a1b; --mod-bg:#2a220c; --poor-bg:#2a1a0c; --bad-bg:#2a1114;
    --info:#a5b4fc; --info-bg:#171a33;
  }
  :root[data-theme="light"]{
    --bg:#eef1f6; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --good:#16a34a; --mod:#d97706; --poor:#ea580c; --bad:#dc2626;
    --good-bg:#dcfce7; --mod-bg:#fef3c7; --poor-bg:#ffedd5; --bad-bg:#fee2e2;
    --info:#4338ca; --info-bg:#eef2ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding:20px 16px 40px}
  .wrap{max-width:720px;margin:0 auto}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  h1{font-size:22px;margin:0;font-weight:700}
  .sub{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--good);display:inline-block}
  .dot.off{background:var(--bad)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px 16px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .k{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .pill{font-size:12.5px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .pill.good{background:var(--good-bg);color:var(--good)} .pill.mod{background:var(--mod-bg);color:var(--mod)}
  .pill.poor{background:var(--poor-bg);color:var(--poor)} .pill.bad{background:var(--bad-bg);color:var(--bad)}
  .pill.info{background:var(--info-bg);color:var(--info)}
  .v{font-size:36px;font-weight:750;line-height:1.05;margin:8px 0 12px}
  .v .u{font-size:15px;font-weight:600;color:var(--muted);margin-left:3px}
  .track{position:relative;height:9px;border-radius:6px;display:flex;overflow:visible;background:var(--line)}
  .zone{height:100%}
  .zone:first-child{border-radius:6px 0 0 6px} .zone:last-child{border-radius:0 6px 6px 0}
  .z-good{background:var(--good)} .z-mod{background:var(--mod)} .z-poor{background:var(--poor)} .z-bad{background:var(--bad)} .z-info{background:var(--info)}
  .track .zone{opacity:.45}
  .marker{position:absolute;top:-3px;width:3px;height:15px;border-radius:3px;background:var(--ink);
    transform:translateX(-50%);box-shadow:0 0 0 2.5px var(--card)}
  .ends{display:flex;justify-content:space-between;margin-top:5px;color:var(--muted);font-size:10.5px}
  footer{color:var(--muted);font-size:12px;line-height:1.6;margin-top:20px}
  footer b{color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏠 Воздух в доме</h1>
    <div class="sub"><span class="dot" id="dot"></span><span id="upd">загрузка…</span></div>
  </header>
  <div class="grid" id="grid"></div>
  <footer>
    <div><b>eCO₂</b> — оценка по летучим веществам, не настоящий CO₂. <b>CO</b> — сырое значение MQ-7 (baseline ~620 в чистом воздухе); пороги предварительные, проверь дымом и уточним. <b>Температура</b> может быть завышена: рядом греется датчик воздуха.</div>
    <div id="src" style="margin-top:6px"></div>
  </footer>
</div>

<script>
// метрика: min/max шкалы, зоны (граница→статус), подпись, форматирование, слово
const M = [
  {key:'aqi',  name:'AQI · качество', min:1, max:5, fmt:v=>v, unit:'',
   zones:[[2,'good'],[3,'mod'],[4,'poor'],[5,'bad']],
   word:v=>v<=1?['Отлично','good']:v==2?['Хорошо','good']:v==3?['Средне','mod']:v==4?['Плохо','poor']:['Вредно','bad']},
  {key:'eco2', name:'eCO₂ · «духота»', min:400, max:2000, fmt:v=>Math.round(v), unit:'ppm',
   zones:[[1000,'good'],[1500,'mod'],[2000,'poor'],[1e9,'bad']],
   word:v=>v<1000?['Свежо','good']:v<1500?['Норма','mod']:v<2000?['Душно','poor']:['Проветрить','bad']},
  {key:'tvoc', name:'TVOC · летучие', min:0, max:1000, fmt:v=>Math.round(v), unit:'ppb',
   zones:[[250,'good'],[660,'mod'],[1e9,'poor']],
   word:v=>v<250?['Хорошо','good']:v<660?['Средне','mod']:['Повышено','poor']},
  {key:'coRaw', name:'CO · угарный газ', min:400, max:3000, fmt:v=>Math.round(v), unit:'raw',
   zones:[[950,'good'],[1500,'mod'],[2200,'poor'],[1e9,'bad']],
   word:v=>v<950?['Спокойно','good']:v<1500?['Рост','mod']:v<2200?['Высоко','poor']:['ТРЕВОГА','bad']},
  {key:'temperature', name:'Температура', min:10, max:35, fmt:v=>v.toFixed(1), unit:'°C',
   zones:[[18,'mod'],[26,'good'],[1e9,'mod']],
   word:v=>v<18?['Прохладно','mod']:v<=26?['Комфорт','good']:['Тепло','mod']},
  {key:'humidity', name:'Влажность', min:20, max:80, fmt:v=>Math.round(v), unit:'%',
   zones:[[30,'mod'],[60,'good'],[70,'mod'],[1e9,'poor']],
   word:v=>v<30?['Сухо','mod']:v<=60?['Комфорт','good']:v<=70?['Влажно','mod']:['Сыро','poor']},
];

function cardHTML(m){
  return `<div class="card">
    <div class="top"><span class="k">${m.name}</span><span class="pill info" id="p-${m.key}">—</span></div>
    <div class="v" id="v-${m.key}">—<span class="u">${m.unit}</span></div>
    <div class="track" id="g-${m.key}"></div>
    <div class="ends"><span>${m.fmt(m.min)}</span><span>${m.max>=1e4?'':m.fmt(m.max)+(m.unit?' '+m.unit:'')}</span></div>
  </div>`;
}
document.getElementById('grid').innerHTML = M.map(cardHTML).join('');

function renderGauge(m, v){
  const span = m.max - m.min;
  let html = '', prev = m.min;
  for(const [to,s] of m.zones){
    const t = Math.min(to, m.max);
    const w = Math.max(0, (t - prev)/span*100);
    if(w>0) html += `<div class="zone z-${s}" style="width:${w}%"></div>`;
    prev = t; if(prev>=m.max) break;
  }
  const pos = v==null?0:Math.max(0,Math.min(100,(v-m.min)/span*100));
  html += `<div class="marker" style="left:${pos}%"></div>`;
  document.getElementById('g-'+m.key).innerHTML = html;
}

async function tick(){
  try{
    const r = await fetch('/api/air',{cache:'no-store'}); if(!r.ok) throw 0;
    const d = await r.json(); const met = d.metrics||{};
    const online = d.status!=='STALE' && d.ageSec!=null;
    document.getElementById('dot').className = 'dot'+(online?'':' off');
    document.getElementById('upd').textContent = online
      ? ('обновлено '+(d.ageSec<60?d.ageSec+' c':Math.round(d.ageSec/60)+' мин')+' назад') : 'нет связи';
    for(const m of M){
      const v = met[m.key];
      const vEl = document.getElementById('v-'+m.key), pEl = document.getElementById('p-'+m.key);
      if(v==null){ vEl.innerHTML='—<span class="u">'+m.unit+'</span>'; pEl.textContent='—'; pEl.className='pill info'; renderGauge(m,null); continue; }
      vEl.innerHTML = m.fmt(v)+'<span class="u">'+m.unit+'</span>';
      const [word,s] = m.word(v);
      pEl.textContent = word; pEl.className = 'pill '+s;
      renderGauge(m, v);
    }
    document.getElementById('src').textContent = 'Источник: PrivoxPTT · датчик «'+(d.name||'AirClimate')+'»';
  }catch(e){
    document.getElementById('dot').className='dot off';
    document.getElementById('upd').textContent='нет данных';
  }
}
tick(); setInterval(tick, 15000);
</script>
</body>
</html>
